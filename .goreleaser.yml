version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: klondike
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: "klondike_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "klondike_{{ .Version }}_checksums.txt"

changelog:
  use: conventional
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^ci"
      - "^docs"

release:
  github:
    owner: rrotaru
    name: solituire
