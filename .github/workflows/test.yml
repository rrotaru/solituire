# .github/workflows/test.yml
name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Layer 1: Engine unit tests + teatest golden tests
      - name: Run all Go tests
        run: go test ./...

      # Build binary for VHS tapes (module produces 'solituire'; tapes expect 'klondike').
      # CGO_ENABLED=0 produces a static binary that runs inside the VHS Docker container.
      - name: Build binary
        run: CGO_ENABLED=0 go build -o klondike .

      # Layer 2: VHS visual regression via Docker (avoids vhs-action ffmpeg install issues).
      # ghcr.io/charmbracelet/vhs has all dependencies pre-installed.
      - name: Run VHS visual regression
        run: |
          mkdir -p testdata/vhs
          for tape in tapes/*.tape; do
            docker run --rm \
              -v "$GITHUB_WORKSPACE:/vhs" \
              -w /vhs \
              ghcr.io/charmbracelet/vhs "$tape"
          done

      - name: Fail on VHS text diff
        run: |
          # Fail if any .txt output is new/untracked — baselines must be committed before merging
          UNTRACKED=$(git ls-files --others --exclude-standard testdata/vhs/ | grep '\.txt$' || true)
          if [ -n "$UNTRACKED" ]; then
            echo "ERROR: VHS .txt baselines are untracked. Generate locally and commit them:"
            echo "$UNTRACKED"
            exit 1
          fi
          # Fail if any tracked .txt baseline has changed (regression detected)
          git diff --exit-code testdata/vhs/*.txt 2>/dev/null || (echo "VHS regression detected — re-run tapes locally and commit updated baselines"; exit 1)

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vhs-screenshots
          path: testdata/vhs/*.png
