# .github/workflows/test.yml
name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Layer 1: Engine unit tests + renderer/tui golden tests.
      # These are fully deterministic and provide the primary regression signal.
      - name: Run all Go tests
        run: go test ./...

      # Build binary for VHS tapes (module produces 'solituire'; tapes expect 'klondike').
      # CGO_ENABLED=0 produces a static binary that works inside the VHS Docker container.
      - name: Build binary
        run: CGO_ENABLED=0 go build -o klondike .

      # Layer 2: VHS smoke test — verify every tape runs without error.
      # The Docker image bundles VHS + ttyd + Chromium + ffmpeg.
      # --privileged gives the container full Linux capabilities so Chromium can
      # create its renderer sandbox (clone/unshare + AppArmor bypass).
      # --shm-size=512m prevents Chromium from crashing on the 64 MB /dev/shm default.
      #
      # Note: txt transcript output from VHS is NOT used as a regression baseline.
      # VHS txt output is non-deterministic across VHS versions: startup frame counts,
      # elapsed-timer values, and blank-line padding all vary with the VHS image tag.
      # Real rendering regressions are caught by the renderer golden-file tests above.
      # This step only verifies that the tapes execute successfully (exit 0).

      - name: Verify Docker and pull VHS image
        run: |
          docker run --rm alpine echo "Docker is functional"
          docker pull ghcr.io/charmbracelet/vhs
          docker run --rm ghcr.io/charmbracelet/vhs --version

      - name: Run VHS tapes
        run: |
          set -o pipefail
          mkdir -p testdata/vhs docs/demo
          for tape in tapes/*.tape; do
            echo "=== $tape ==="
            docker run --rm \
              --privileged \
              --shm-size=512m \
              -v "$GITHUB_WORKSPACE:/vhs" \
              -w /vhs \
              ghcr.io/charmbracelet/vhs "$tape"
          done

      - name: Upload VHS outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vhs-outputs
          path: |
            testdata/vhs/*.png
            testdata/vhs/*.txt
            docs/demo/*.gif
          if-no-files-found: ignore
