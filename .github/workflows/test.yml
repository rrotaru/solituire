# .github/workflows/test.yml
name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Allow pushing baseline commits back to the branch.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Layer 1: Engine unit tests + teatest golden tests
      - name: Run all Go tests
        run: go test ./...

      # Build binary for VHS tapes (module produces 'solituire'; tapes expect 'klondike').
      - name: Build binary
        run: CGO_ENABLED=0 go build -o klondike .

      # Layer 2: VHS visual regression. Install VHS + ffmpeg directly from Charmbracelet's
      # apt repo to avoid vhs-action's broken ffmpeg installer and Docker overhead.
      - name: Install VHS and dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | \
            sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | \
            sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update && sudo apt-get install -y vhs ffmpeg

      - name: Run VHS visual regression
        run: |
          mkdir -p testdata/vhs
          for tape in tapes/*.tape; do
            vhs "$tape"
          done

      # Auto-commit generated .txt baselines so they are always tracked.
      # On the first run (no prior baselines) this bootstraps them; on subsequent
      # runs it commits any regression updates so diffs are visible in the PR.
      # [skip ci] prevents an infinite trigger loop.
      - name: Commit VHS baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add testdata/vhs/*.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit."
          else
            git commit -m "ci: update VHS text baselines [skip ci]"
            git push origin HEAD
          fi

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vhs-screenshots
          path: testdata/vhs/*.png
