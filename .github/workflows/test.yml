# .github/workflows/test.yml
name: Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push auto-generated baselines back to the branch
    steps:
      - uses: actions/checkout@v4
        with:
          # Persist credentials so the baseline-commit step can push.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Layer 1: Engine unit tests + teatest golden tests
      - name: Run all Go tests
        run: go test ./...

      # Build binary for VHS tapes (module produces 'solituire'; tapes expect 'klondike').
      - name: Build binary
        run: CGO_ENABLED=0 go build -o klondike .

      # Layer 2: VHS visual regression.
      # - ffmpeg: from Ubuntu apt (stable, always present).
      # - ttyd:   direct binary from GitHub releases; VHS requires >= 1.7.2 and Ubuntu
      #           apt ships an older version.
      # - vhs:    go install ensures we get the latest release without relying on the
      #           charm apt repo, which has proven flaky in CI.
      # Chrome (google-chrome-stable) is pre-installed on ubuntu-latest and is found
      # automatically by VHS's chromedp dependency.
      - name: Install VHS and dependencies
        run: |
          sudo apt-get install -y ffmpeg
          # ttyd >= 1.7.2 required; ubuntu apt ships an older version.
          sudo curl -fsSL \
            "https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64" \
            -o /usr/local/bin/ttyd
          sudo chmod +x /usr/local/bin/ttyd
          # Build VHS as the runner user (so go can use its normal module cache),
          # then copy the binary to /usr/local/bin with sudo.
          go install github.com/charmbracelet/vhs@latest
          sudo cp "$(go env GOPATH)/bin/vhs" /usr/local/bin/vhs
          # Wrap every Chrome binary name that chromedp searches for so they all
          # include --no-sandbox and --disable-dev-shm-usage. /usr/local/bin comes
          # before /usr/bin in the default PATH, so these wrappers take precedence.
          REAL_CHROME=$(ls /usr/bin/google-chrome-stable /usr/bin/google-chrome \
            /usr/bin/chromium-browser /usr/bin/chromium 2>/dev/null | head -1)
          echo "Using Chrome binary: $REAL_CHROME"
          for NAME in google-chrome-stable google-chrome chromium-browser chromium; do
            printf '#!/bin/sh\nexec %s --no-sandbox --disable-dev-shm-usage "$@"\n' \
              "$REAL_CHROME" | sudo tee /usr/local/bin/$NAME > /dev/null
            sudo chmod +x /usr/local/bin/$NAME
          done
          # Fail fast if anything is missing.
          vhs --version
          ttyd --version
          google-chrome --version

      - name: Run VHS visual regression
        run: |
          mkdir -p testdata/vhs
          for tape in tapes/*.tape; do
            vhs "$tape"
          done

      # Regression gate + first-run bootstrap.
      #
      # - FAIL if any tracked .txt baseline changed — that's a regression requiring human review.
      # - AUTO-COMMIT brand-new (never-tracked) baselines so the first CI run bootstraps them
      #   without masking future regressions.
      # - Use explicit "HEAD:<branch>" push target to avoid "detached HEAD" failures on
      #   pull_request events where actions/checkout does not check out a real branch ref.
      - name: Commit new VHS baselines / fail on regressions
        run: |
          # Detect regressions: fail if any tracked baseline has changed.
          CHANGED=$(git diff --name-only testdata/vhs/*.txt 2>/dev/null || true)
          if [ -n "$CHANGED" ]; then
            echo "ERROR: VHS regression detected in the following baselines:"
            echo "$CHANGED"
            git diff testdata/vhs/*.txt
            echo "Review the diff and commit intentional changes manually."
            exit 1
          fi
          # Bootstrap: auto-commit brand-new baselines that have never been tracked.
          UNTRACKED=$(git ls-files --others --exclude-standard testdata/vhs/ | grep '\.txt$' || true)
          if [ -z "$UNTRACKED" ]; then
            echo "All baselines are tracked and unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # shellcheck disable=SC2086
          git add $UNTRACKED
          git commit -m "ci: add initial VHS text baselines [skip ci]"
          # Skip the push on forked PRs — the token is read-only there and origin
          # points to the upstream repo, not the fork. Print a message instead.
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            HEAD_REPO=$(jq -r '.pull_request.head.repo.full_name // empty' \
              "$GITHUB_EVENT_PATH" 2>/dev/null || true)
            if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
              echo "Fork PR: cannot push baselines (read-only token)."
              echo "A maintainer must download the 'vhs-screenshots' artifact and commit the .txt files."
              exit 0
            fi
          fi
          # GITHUB_HEAD_REF is set on pull_request events (the PR source branch).
          # GITHUB_REF_NAME is the branch name on push events.
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git push origin "HEAD:$BRANCH"

      - name: Upload VHS outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vhs-outputs
          path: |
            testdata/vhs/*.png
            testdata/vhs/*.txt
          if-no-files-found: ignore
